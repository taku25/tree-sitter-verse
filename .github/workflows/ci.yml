name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate parser
        run: npx tree-sitter generate

      - name: Run corpus tests
        run: npx tree-sitter test

      - name: Validate query files
        run: |
          npx tree-sitter query queries/highlights.scm test/example.verse
          npx tree-sitter query queries/locals.scm     test/example.verse
          npx tree-sitter query queries/tags.scm       test/example.verse
        continue-on-error: false
